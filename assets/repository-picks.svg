    <text x="68" y="481" class="body">온톨로지로 정리합니다.</text>
    <circle cx="71" cy="499" r="3" fill="#2563eb"/><text x="82" y="503" class="bullet">raw, wiki, ontology, outputs 레이어 분리</text>
    <circle cx="71" cy="521" r="3" fill="#2563eb"/><text x="82" y="525" class="bullet">품질 게이트, 액션 큐, 운영 대시보드 포함</text>
    <circle cx="71" cy="543" r="3" fill="#2563eb"/><text x="82" y="547" class="bullet">보고서와 발표 자료까지 재가공하는 템플릿 킷</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Owen Markdown Knowledge Work Stack</title>
  <desc id="desc">Owen WIKI, Owen Graphite, Owen Editor repository picks for LLM wiki and Obsidian writing workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="0.58" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e7f6f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#52637a" flood-opacity="0.16"/>
    </filter>
    <style>
      .label{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
      .title{font:800 40px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .subtitle{font:500 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
      .cardTitle{font:800 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .cardSub{font:500 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}
      .body{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .bullet{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}
      .small{font:700 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}
      .metric{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#2563eb}
      .metricLabel{font:600 8px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="24" y="24" width="1232" height="672" rx="22" fill="url(#bg)" stroke="#cbd5e1"/>
  <text x="51" y="51" class="label">towishy GitHub Repository Picks</text>
  <text x="51" y="96" class="title">LLM Wiki부터 Obsidian 작성 환경까지 이어지는</text>
  <text x="51" y="132" class="title">지식 작업 스택</text>
  <text x="1228" y="60" class="subtitle" text-anchor="end">수집, 정제, 작성, 출력을 하나의 흐름으로 묶는 Owen의</text>
  <text x="1228" y="84" class="subtitle" text-anchor="end">Markdown 기반 도구 모음.</text>

